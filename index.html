<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DocuMind Scan</title>

  <!-- Polyfill process for some libraries if needed -->
  <script>
    window.process = { env: {} };
    window.onerror = function (msg, url, line, col, error) {
      var debug = document.getElementById('debug-info');
      if (debug) {
        debug.style.display = 'block';
        debug.innerHTML += '<p style="color:red;margin-top:10px;">Error: ' + msg + '<br>URL: ' + url + '<br>Línea: ' + line + '</p>';
      }
      return false;
    };
  </script>

  <!-- Dependencies -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f2f2f7;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .select-text {
      user-select: text;
      -webkit-user-select: text;
    }

    /* Loading Spinner for initial load */
    .initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #64748b;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translate3d(0, 20px, 0);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out;
    }

    .animate-pulse-slow {
      animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .animate-spin-slow {
      animation: spin 3s linear infinite;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="initial-loader">
      <div class="spinner"></div>
      <p>Cargando DocuMind...</p>
      <div id="debug-info"
        style="display:none; padding: 20px; font-family: monospace; font-size: 12px; background: #eee; border: 1px solid #ccc; margin: 20px; border-radius: 8px; overflow: auto; max-height: 200px;">
        <strong>Información de depuración:</strong>
      </div>
    </div>
  </div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
